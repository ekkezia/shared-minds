<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PiPiPiP</title>
    <style>
      * {
        font-family: 'Courier New', Courier, monospace !important;
      }
      
      body,
      button {
        margin: 0;
        background: #0f172a !important;
        font-weight: 400 !important;
        color: #f1f5f9 !important;
      }
      input {
        font-family: 'Courier New', Courier, monospace;
        background: #1e293b;
        border: 1px dotted #475569;
        color: #f1f5f9;
        padding: 8px;
      }
      h1 {
        font-family: 'Courier New', Courier, monospace;
        color: #f1f5f9;
        font-weight: 400;
        letter-spacing: 2px;
        border: 1px dotted #475569;
        padding: 16px 32px;
        background: transparent;
      }
      label {
        font-family: 'Courier New', Courier, monospace;
        color: #f1f5f9 !important;
      }
      button:hover {
        background: #334155 !important;
        border-color: #f1f5f9 !important;
      }
      .container {
        margin: 0 auto;
        background: #0f172a;
      }
      .controls {
        padding: 20px;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: calc(100dvh - 201px);
      }
      #tokenStatus {
        font-size: 0.9rem;
        color: #94a3b8;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 200px;
        font-family: 'Courier New', Courier, monospace;
      }
      .input-group {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        width: 100dvw;
        display: flex;
        justify-content: space-between;
        gap: 1rem;
      }
      #saveContainer {
        width: 300px;
        display: flex;
      }
      #replicateToken {
        width: 100%;
        height: 1rem;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: normal;
      }
      label,
      button {
        padding: 8px 12px;
        border-radius: 0;
      }
      button {
        background: transparent;
        color: #f1f5f9;
        border: 1px dotted #475569;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover {
        background: #1e293b;
        border-color: #f1f5f9;
      }
      button:disabled {
        background: #1e293b;
        cursor: not-allowed;
        opacity: 0.5;
      }
      .timeline {
        border-top: 2px dotted #f1f5f9;
        width: 100dvw;
        height: 200px;
        position: fixed;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: start;
        overflow-x: scroll;
        white-space: nowrap;
        cursor: zoom-out;
        background: #1e293b;
      }
      .image-item {
        min-width: 200px;
        width: 200px;
        height: fit-content;
        cursor: zoom-in;
        overflow: hidden; 
        transition: transform 0.2s;
        box-sizing: content-box;
        border: 1px dotted #475569;
        margin-right: 8px;
      }
      .image-item:hover {
        border: 1px dotted #f1f5f9;
      }
      .image-item img {
        width: 200px;
        height: 150px;
        object-fit: cover;
        display: block;
      }
      .image-info {
        padding: 8px;
        background: #1e293b;
        font-size: 12px;
        color: #94a3b8;
        white-space: normal;
        border-top: 1px dotted #475569;
      }
      .loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.95);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 2px dotted #475569;
        border-top: 2px dotted #f1f5f9;
        border-radius: 0;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .status {
        margin-top: 10px;
        padding: 10px;
        border-radius: 0;
        display: none;
        border: 1px dotted #475569;
      }
      .status.success {
        background: #1e293b;
        color: #86efac;
        border: 1px dotted #86efac;
      }
      .status.error {
        background: #1e293b;
        color: #fca5a5;
        border: 1px dotted #fca5a5;
      }
      #uploadImage {
        background-color: transparent;
        border: 1px dotted #475569;
        border-radius: 0;
        cursor: pointer;
      }
      .upload-next {
        border: 1px dotted #475569;
        width: 200px;
        min-width: 200px;
        height: 148px;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: translateY(-15px);
        cursor: pointer !important;
        background: #1e293b;
      }
      .upload-plus {
        margin-left: 1rem;
        font-size: 24px !important;
        font-weight: normal !important;
        background: transparent;
        color: #f1f5f9 !important;
        border: none !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        transition: all 0.2s !important;
        margin: 0 !important;
        padding: 0 !important;
        background: transparent !important;
        z-index: 1000;
        position: relative;
      }
      .upload-plus:hover {
        background: none;
      }
      .upload-next:hover {
        background: #1e293b !important;
        border-color: #f1f5f9 !important;
        .upload-plus {
          color: #f1f5f9 !important;
          background: transparent !important;
          transform: scale(2) !important;
        }
      }

      .upload-plus:disabled {
        background: #1e293b !important;
        cursor: not-allowed;
        transform: none;
        opacity: 0.5;
      }

      #add-bbox {
        position: absolute;
        border: 2px dotted #f1f5f9;
        pointer-events: auto;
        z-index: 1000;
        box-sizing: border-box;
      }

      #viewer {
        /* pointer-events: none; */
        position: fixed;
        top: 0;
        left: 0;
        width: 100dvw; /* or 100% if responsive */
        height: calc(100dvh - 200px);
        overflow: hidden;
        margin: auto;
        background: #0f172a;
        cursor: zoom-in;
      }
      #mainImage {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-origin: center center;
        transition: transform 0.2s ease;
      }
      #bbox {
        position: absolute;
        pointer-events: none;
        border: 1px dotted #475569;
      }
      a {
        text-decoration: none;
        color: #f1f5f9;
        border-bottom: 1px dotted #475569;
      }
      a:hover {
        background: #1e293b;
        border-bottom-color: #f1f5f9;
      }
      #wikimedia-search {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        gap: 1rem;
      }
      #searchKeyword {
        width: 30vw;
        font-size: 2.5rem;
      }
      #searchBtn {
        font-size: 2.5rem;
        padding: 0.5rem 1rem;
      }
      #mainImage {
        display: none;
      }
      #upload-status {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #1e293b;
        color: #f1f5f9;
        padding: 10px 20px;
        border-radius: 0;
        border: 1px dotted #475569;
        font-size: 1rem;
        z-index: 10001;
        display: none;
      }
      #add-container {
        background: transparent;
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        width: fit-content;
        height: fit-content;
        border: 1px dotted #475569;
      }
      .delete-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 24px;
        height: 24px;
        background: #1e293b;
        border: 1px dotted #f1f5f9;
        color: #f1f5f9;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        line-height: 1;
        z-index: 10;
        padding: 0;
        transition: all 0.2s;
      }
      .delete-btn:hover {
        background: #dc2626;
        border-color: #dc2626;
      }
      .image-item:hover .delete-btn {
        display: flex;
      }
      .image-item {
        position: relative;
        transition: opacity 0.2s, filter 0.2s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="controls">
        <h1>PiPiPiP</h1>

        <div id="status" class="status"></div>
      </div>

      <div class="timeline" id="timeline">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
    </div>

    <div id="viewer">
      <img id="mainImage" src="yourImage.jpg" />
      <div id="bbox"></div>

      <img id="add-image" src="yourImage.jpg" />
      <div id="add-bbox"></div>
      <div
        id="placement-info"
        style="
          margin-top: 8px;
          font-family: monospace;
          font-size: 14px;
          color: #00bcd4;
        "
      ></div>
      <div
        id="hoverLabel"
        style="
          position: absolute;
          padding: 2px 6px;
          background: rgba(0, 0, 0, 0.7);
          color: white;
          font-size: 12px;
          border-radius: 4px;
          pointer-events: none;
          display: none;
          z-index: 9999;
        "
      ></div>
    </div>

    <div id="upload-status" class="upload-status"></div>

    <script type="module" src="index.js"></script>
  </body>
</html>
